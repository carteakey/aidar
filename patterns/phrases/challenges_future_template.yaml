id: challenges_future_template
version: 1
name: Challenges and Future Outlook Template
description: >
  Detects formulaic "despite challenges / future prospects" framing that often
  appears in generated encyclopedic text. The signal is not definitive alone,
  but contributes when combined with stronger artifact markers.
category: phrases
weight: 0.68
detection_type: frequency
severity: medium
references:
  - https://en.wikipedia.org/wiki/Wikipedia:Signs_of_AI_writing
params:
  terms:
    - "despite these challenges"
    - "faces several challenges"
    - "future prospects"
    - "future outlook"
    - "ongoing initiatives"
    - "maintain its relevance"
    - "could enhance"
    - "continues to evolve in response to these challenges"
    - "despite its success"
    - "despite their promising applications"
  match_mode: contains
  per_n_words: 1000
  threshold_low: 0.8
  threshold_high: 7.0

