id: negative_parallelism
version: 1
name: Negative Parallelism
description: >
  The "It's not X — it's Y" pattern, often with an em dash or period. The single
  most commonly identified AI writing tell. AI uses this to create false profundity
  by framing everything as a surprising reframe. Includes causal variants like
  "not because X, but because Y". This detector uses regex to capture the full
  scope of these structures across varied subjects and punctuation.
category: tropes
weight: 0.90
detection_type: regex
severity: high
references:
  - https://tropes.fyi
params:
  patterns:
    # "It's not X [punctuation] It's Y" or "Something isn't X. It's Y."
    # Matches: "It's not bold. It's backwards."
    # Matches: "It's not a bug, it's a feature."
    # Matches: "The problem isn't the code. It's the architecture."
    # Matches: "They aren't users — they're participants."
    - '\b(?:it''?s not|it is not|\w+ isn''?t|\w+ aren''?t)\b[^.,:;—–\n]{1,80}[.,:;—–\s]\s*(?:but\b|it''?s\b|it is\b|they''?re\b|they are\b|rather\b)'
    
    # "Not because X, but because Y"
    # Matches: "Not because it's easy, but because it's hard."
    - '\bnot because\s+[^.,:;—–\n]{1,80}[.,:;—–\s]\s*but because\b'
    
    # "Not X, but Y" (more generic, tighter constraint to avoid false positives)
    # Matches: "Not merely a tool, but a platform."
    - '\bnot (?:just|merely|simply|only)?\s*[^.,:;—–\n]{1,60}[.,:;—–]\s*but (?:rather|instead|also)?\s*\b'
    
  per_n_words: 1000
  threshold_low: 0.5   # Even 1 instance per 2000 words is a strong signal
  threshold_high: 5.0
